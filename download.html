        /* Дополнительные стили для селекторов и модулей */
        .selector-panel {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: var(--shadow);
        }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .selector-group label {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .selector-group select {
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 1rem;
            background: var(--bg-light);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .selector-group select:hover:not(:disabled) {
            border-color: var(--primary-light);
        }

        .selector-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .selector-group select:disabled {
            background: #eee;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .download-result {
            background: var(--bg-light);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .download-result h3 {
            margin-top: 0;
            color: var(--primary-dark);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .package-list {
            list-style: none;
            margin: 1rem 0 0 0;
        }

        .package-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }

        .package-list li:last-child {
            border-bottom: none;
        }

        .package-name {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--primary);
        }

        .package-desc {
            color: var(--text-dark);
            font-size: 0.9rem;
            flex: 1;
            margin-left: 1rem;
        }

        .package-link {
            background: var(--accent);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .package-link.disabled {
            background: #ccc;
            pointer-events: none;
            cursor: not-allowed;
        }

        .package-link:hover:not(.disabled) {
            background: var(--secondary);
        }

        .install-instructions {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .status-ready {
            background: #27ae60;
            color: white;
        }

        .status-beta {
            background: #f39c12;
            color: white;
        }

        .status-dev {
            background: #7f8c8d;
            color: white;
        }

        .module-type-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;

            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .module-type-tab.dict {
            background: var(--primary-light);
            color: white;
        }

        .module-type-tab.fuzzy {
            background: #e67e22;
            color: white;
        }

        .module-type-tab:hover {
            opacity: 0.8;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .module-card {
            background: var(--bg-white);

            border-radius: 10px;
            padding: 1.5rem;

            border-left: 6px solid #e67e22;
        }

        .module-card.inactive {

            position: relative;
        }

        .module-card.inactive::after {

            position: absolute;
            top: -0.5rem;
            right: 1rem;
            background: var(--text-dark);
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;

        .inactive-badge {

            border-radius: 20px;
            font-size: 0.7rem;

            margin-top: 1rem;

            font-size: 0.9rem;
            position: relative;
        }

        .packages-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .package-row {
            display: grid;
            grid-template-columns: 200px 1fr 120px;
            align-items: center;
            gap: 1rem;

        .package-row:last-child {

        }
        
        .package-name {
            font-family: var(--font-mono);
            font-weight: 600;

            color: var(--text-dark);

        .package-link {

            font-weight: 500;

            text-align: center;
            justify-self: end;
        }

        }

                runtime: 'sudo dnf install {package}',
                dev: 'sudo dnf install {package}'
            },

                dev: 'Скачайте ZIP и распакуйте в C:\\libmorph\\'
            }
        };

        function updateDownload() {
            const lang = document.getElementById('lang-select').value;
            const type = document.getElementById('type-select').value;
            const platform = document.getElementById('platform-select').value;
            const pkgType = document.getElementById('package-select').value;
            
            try {
                const data = downloads[lang][type][platform][pkgType];
                const resultDiv = document.getElementById('download-result');
                
                if (!data) {
                    resultDiv.innerHTML = `
                        <p>Для выбранной комбинации пакет не найден.</p>
                    `;
                    return;
                }
                
                const isAvailable = data.url !== null && data.url !== undefined;
                
                // Проверяем, dev ли это пакет (требует libmorph-api)
                const isDevPackage = pkgType === 'dev' || data.name.includes('-dev');
                
                // Данные для libmorph-api (если нужно)
                let apiData = null;
                if (isDevPackage) {
                    apiData = {
                        name: 'libmorph-api',
                        desc: 'Базовый API для всех морфологических анализаторов',
                        url: 'deb/pool/main/libm/libmorph-api/libmorph-api_4_all.deb'
                    };
                }
                
                let html = `<div class="packages-grid">`;
                
                // Основной пакет
                html += `
                    <div class="package-row">
                        <span class="package-name">${data.name}</span>
                        <span class="package-desc">${data.desc}</span>
                        ${isAvailable ? 
                            `<a href="${data.url}" class="package-link">Скачать</a>` : 
                            `<span class="package-link disabled">Скачать</span>`}
                    </div>
                `;
                
                // Если есть зависимость, показываем её
                if (isDevPackage && apiData) {
                    html += `
                        <div class="package-row">
                            <span class="package-name">${apiData.name}</span>
                            <span class="package-desc">${apiData.desc} (требуется)</span>
                            <a href="${apiData.url}" class="package-link">Скачать</a>
                        </div>
                    `;
                }
                
                html += `</div>`;
        
                // Инструкции по установке в зависимости от платформы
                if (platform === 'deb') {
                    html += `
                        <div class="install-instructions">
                            <strong>Подключение репозитория (однократно):</strong><br>
                            <code>curl -sSf https://libmorph.ru/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/libmorph-archive-keyring.gpg </code><br>
                            <code>echo "deb https://libmorph.ru/deb stable main" | sudo tee /etc/apt/sources.list.d/libmorph.list</code><br>
                            <code>sudo apt update</code>
                        </div>
                    `;
                    
                    if (isAvailable) {
                        let installCmd = '';
                        if (pkgType === 'runtime') {
                            installCmd = `sudo apt install ${data.name}`;
                        } else if (pkgType === 'dev') {
                            installCmd = `sudo apt install ${data.name}  # автоматически установит libmorph-api`;
                        }
                        html += `
                            <div class="install-instructions">
                                <strong>Установка пакета:</strong> ${installCmd}
                            </div>
                        `;
                    }
                } else if (platform === 'rpm') {
                    html += `
                        <div class="install-instructions">
                            <strong>Подключение репозитория (однократно):</strong><br>
                            <code>sudo rpm --import https://libmorph.ru/keys/libmorph.asc</code><br>
                            <code>sudo curl -o /etc/yum.repos.d/libmorph.repo https://libmorph.ru/rpm/libmorph.repo</code>
                        </div>
                    `;
                    
                    if (isAvailable) {
                        html += `
                            <div class="install-instructions">
                                <strong>Установка пакета:</strong> sudo dnf install ${data.name}
                            </div>
                        `;
                    }
                } else if (platform === 'windows') {
                    html += `
                        <div class="install-instructions">
                            <strong>Установка:</strong> Скачайте ZIP и распакуйте в C:\\libmorph\\
                        </div>
                    `;
                }
                
                if (!isAvailable) {
                    html += `
                        <div class="note warning" style="margin-top: 1rem;">
                            <strong>Модуль в разработке</strong><br>
                            ${data.status === 'dev' ? 
                                'Ожидайте в ближайших релизах.' : 
                                'Временно недоступно.'}
                        </div>
                    `;
                }
                
                resultDiv.innerHTML = html;
            } catch (e) {
                document.getElementById('download-result').innerHTML = `
                    <p>Для выбранной комбинации пакет не найден.</p>
                `;
            }
        }
        // Инициализация при загрузке
        window.onload = updateDownload;
    </script>
